<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cambiar contraseña</title>
    <link rel="stylesheet" href="./css/admin.css">
</head>
<body>

    <div class="admin-login-page">
        <form id="change-password-form" class="admin-login-card">
            <div class="admin-login-header">
                <span class="admin-login-badge">Seguridad de acceso</span>
                <h1>Cambiar contraseña</h1>
                <p class="admin-login-subtitle">
                    Por seguridad, debes cambiar tu contraseña temporal antes de entrar al panel.
                </p>
            </div>

            <div class="admin-login-form">
                <div class="admin-login-form-group">
                    <label for="currentPassword">Contraseña actual</label>
                    <input id="currentPassword" type="password" required>
                </div>

                <div class="admin-login-form-group">
                    <label for="newPassword">Nueva contraseña</label>
                    <input id="newPassword" type="password" required>
                </div>

                <div class="admin-login-form-group">
                    <label for="confirmPassword">Confirmar nueva contraseña</label>
                    <input id="confirmPassword" type="password" required>
                </div>

                <button type="submit" class="admin-login-submit" id="change-password-btn">
                    Actualizar contraseña
                </button>

                <p id="msg" class="admin-login-message"></p>
            </div>
        </form>
    </div>

    <script src="./js/change-password.js"></script>
</body>
</html>
