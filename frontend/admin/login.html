<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Admin</title>
    <link rel="stylesheet" href="./css/admin.css">
</head>
<body>

    <div class="admin-login-page">
        <form id="login-form" class="admin-login-card">
            <div class="admin-login-header">
                <span class="admin-login-badge">Acceso administrativo</span>
                <h1>Panel Admin</h1>
                <p class="admin-login-subtitle">
                    Ingresa con tus credenciales para administrar el contenido del portal de Informática Administrativa.
                </p>
            </div>

            <div class="admin-login-form">
                <div class="admin-login-form-group">
                    <label for="username">Usuario</label>
                    <input id="username" name="username" placeholder="Ingresa tu usuario" autocomplete="username" required>
                </div>

                <div class="admin-login-form-group">
                    <label for="password">Contraseña</label>
                    <input id="password" name="password" type="password" placeholder="Ingresa tu contraseña" autocomplete="current-password" required>
                </div>

                <button type="submit" class="admin-login-submit" id="login-btn">Entrar</button>
                <p id="msg" class="admin-login-message"></p>
            </div>
        </form>
    </div>

    <script src="./js/auth.js"></script>
</body>
</html>
